<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wave Level Indicator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Bebas+Neue&display=swap');

:root {
  --bg: #06090f;
  --panel: #0a0f18;
  --border: #141e2e;
  --border2: #1e2d42;
  --green: #00e676;
  --red: #f5455c;
  --yellow: #ffcc02;
  --blue: #4fc3f7;
  --text: #4a6a8a;
  --text2: #7a9ab8;
  --text3: #b8d4ec;
  --glow-g: 0 0 16px rgba(0,230,118,.5);
  --glow-r: 0 0 16px rgba(245,69,92,.5);
  --glow-b: 0 0 16px rgba(79,195,247,.5);
  --glow-y: 0 0 16px rgba(255,204,2,.5);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text3);font-family:'JetBrains Mono',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── TOPBAR ── */
.topbar{
  height:48px;flex-shrink:0;
  background:var(--panel);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:0;
  padding:0 12px;
}
.logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:20px;letter-spacing:3px;
  color:var(--blue);text-shadow:var(--glow-b);
  margin-right:16px;white-space:nowrap;
}

/* Search bar */
.search-wrap{
  display:flex;align-items:center;
  background:rgba(255,255,255,.04);
  border:1px solid var(--border2);
  border-radius:3px;
  padding:0 10px;height:32px;gap:8px;
  position:relative;
}
.search-wrap input{
  background:transparent;border:none;outline:none;
  color:var(--text3);font-family:'JetBrains Mono',monospace;
  font-size:13px;width:140px;text-transform:uppercase;
}
.search-wrap input::placeholder{color:var(--text);text-transform:none}
.search-btn{
  background:var(--blue);color:#06090f;border:none;
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;
  padding:4px 10px;border-radius:2px;cursor:pointer;
  transition:all .2s;white-space:nowrap;
}
.search-btn:hover{background:#80d8ff;box-shadow:var(--glow-b)}
.search-btn:disabled{background:var(--border2);color:var(--text);cursor:not-allowed}

/* Suggested chips */
.chips{display:flex;gap:6px;margin-left:10px;flex-wrap:nowrap}
.chip{
  padding:4px 10px;border:1px solid var(--border2);
  background:rgba(255,255,255,.02);border-radius:2px;
  font-size:11px;color:var(--text2);cursor:pointer;
  transition:all .15s;white-space:nowrap;
}
.chip:hover{border-color:var(--blue);color:var(--blue);background:rgba(79,195,247,.08)}
.chip.crypto{border-color:rgba(0,230,118,.3);color:var(--green)}
.chip.crypto:hover{border-color:var(--green);background:rgba(0,230,118,.08)}
.chip.stock{border-color:rgba(79,195,247,.3)}

/* Price + status */
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:16px}
.price-big{
  font-family:'Bebas Neue',sans-serif;font-size:24px;
  letter-spacing:1px;color:var(--blue);
  text-shadow:var(--glow-b);transition:color .3s;
}
.price-big.up{color:var(--green);text-shadow:var(--glow-g)}
.price-big.down{color:var(--red);text-shadow:var(--glow-r)}
.price-change{font-size:11px;color:var(--text2)}
.price-change.up{color:var(--green)}
.price-change.down{color:var(--red)}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--text)}
.status-dot.live{background:var(--green);box-shadow:var(--glow-g);animation:blink 2s infinite}
.status-dot.loading{background:var(--yellow);animation:blink .5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.status-txt{font-size:10px;color:var(--text);letter-spacing:1px}
.tf-label{font-size:11px;color:var(--text);padding:3px 7px;border:1px solid var(--border2);border-radius:2px}

/* ── MAIN ── */
.main{display:flex;flex:1;overflow:hidden;min-height:0}

/* ── CHART ── */
.chart-wrap{flex:1;position:relative;overflow:hidden;min-width:0}
canvas#chart{display:block;width:100%;height:100%}

/* Alert banner */
.alert-banner{
  position:absolute;top:14px;left:50%;transform:translateX(-50%) translateY(-20px);
  background:rgba(255,204,2,.1);border:1px solid var(--yellow);
  color:var(--yellow);padding:7px 18px;
  font-size:12px;letter-spacing:1px;border-radius:2px;
  box-shadow:var(--glow-y);opacity:0;pointer-events:none;
  transition:all .35s;white-space:nowrap;z-index:10;
}
.alert-banner.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Overlay loading */
.overlay{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(6,9,15,.85);z-index:20;
  gap:12px;transition:opacity .4s;
}
.overlay.hidden{opacity:0;pointer-events:none}
.spinner{
  width:36px;height:36px;border:2px solid var(--border2);
  border-top-color:var(--blue);border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.overlay-txt{font-size:12px;color:var(--text2);letter-spacing:2px}

/* Error */
.error-msg{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(245,69,92,.1);border:1px solid var(--red);
  color:var(--red);padding:10px 20px;border-radius:3px;
  font-size:12px;z-index:25;display:none;text-align:center;
}

/* ── SIDEBAR ── */
.sidebar{
  width:240px;flex-shrink:0;
  border-left:1px solid var(--border);
  background:var(--panel);
  display:flex;flex-direction:column;
  overflow-y:auto;
  font-size:11px;
}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.sb-section{padding:10px 12px;border-bottom:1px solid var(--border)}
.sb-title{
  font-size:9px;letter-spacing:3px;text-transform:uppercase;
  color:var(--text);margin-bottom:8px;
}

/* Settings sliders */
.srow{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;color:var(--text2)}
.srow span{color:var(--text3)}
input[type=range]{width:80px;accent-color:var(--blue);cursor:pointer}

/* Level cards */
.level-card{
  padding:7px 9px;margin-bottom:5px;
  border-radius:2px;border-left:2px solid transparent;
  transition:all .25s;
}
.level-card.sup{background:rgba(0,230,118,.05);border-color:var(--green)}
.level-card.res{background:rgba(245,69,92,.05);border-color:var(--red)}
.level-card.near{animation:lvl-pulse .9s ease-in-out infinite}
.level-card.sup.near{background:rgba(0,230,118,.15)}
.level-card.res.near{background:rgba(245,69,92,.15)}
@keyframes lvl-pulse{0%,100%{opacity:1}50%{opacity:.5}}

.lc-row{display:flex;justify-content:space-between;align-items:center}
.lc-price{font-size:13px;font-weight:600}
.level-card.sup .lc-price{color:var(--green)}
.level-card.res .lc-price{color:var(--red)}
.lc-badge{font-size:9px;padding:1px 5px;border-radius:1px;letter-spacing:1px}
.level-card.sup .lc-badge{background:rgba(0,230,118,.15);color:var(--green)}
.level-card.res .lc-badge{background:rgba(245,69,92,.15);color:var(--red)}
.lc-dots{display:flex;gap:3px;margin-top:4px}
.lc-dot{width:5px;height:5px;border-radius:50%;background:var(--border2)}
.level-card.sup .lc-dot{background:var(--green)}
.level-card.res .lc-dot{background:var(--red)}
.lc-near-ico{color:var(--yellow);font-size:10px;margin-left:4px}

/* Stats grid */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.stat-box{background:rgba(255,255,255,.02);border:1px solid var(--border);padding:6px 8px;border-radius:2px}
.stat-lbl{font-size:8px;color:var(--text);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.stat-val{font-size:15px;color:var(--text3);font-weight:600}

/* Buttons */
.btn-row{display:flex;gap:6px;padding:10px 12px;border-bottom:1px solid var(--border)}
.btn{
  flex:1;padding:6px;border:1px solid var(--border2);
  background:rgba(255,255,255,.02);color:var(--text3);
  font-family:'JetBrains Mono',monospace;font-size:10px;
  letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;
  border-radius:2px;transition:all .2s;
}
.btn:hover{border-color:var(--blue);color:var(--blue);background:rgba(79,195,247,.07)}
.btn.active{border-color:var(--blue);color:var(--blue);background:rgba(79,195,247,.1)}

/* No levels msg */
.no-lvl{color:var(--text);font-size:10px;text-align:center;padding:14px 0;opacity:.5}

/* Symbol info */
.sym-info{font-size:10px;color:var(--text);padding:8px 12px;border-bottom:1px solid var(--border);line-height:1.7}
.sym-info b{color:var(--text2)}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">WLI</div>

  <div class="search-wrap">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#4a6a8a" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="symInput" type="text" placeholder="BTC, AAPL, EURUSD…" maxlength="12" autocomplete="off"/>
    <button class="search-btn" id="loadBtn" onclick="loadSymbol()">ЗАГРУЗИТЬ</button>
  </div>

  <div class="chips">
    <div class="chip crypto" onclick="quickLoad('BTCUSDT','crypto')">BTC</div>
    <div class="chip crypto" onclick="quickLoad('ETHUSDT','crypto')">ETH</div>
    <div class="chip crypto" onclick="quickLoad('SOLUSDT','crypto')">SOL</div>
    <div class="chip crypto" onclick="quickLoad('BNBUSDT','crypto')">BNB</div>
    <div class="chip stock" onclick="quickLoad('AAPL','stock')">AAPL</div>
    <div class="chip stock" onclick="quickLoad('TSLA','stock')">TSLA</div>
    <div class="chip stock" onclick="quickLoad('NVDA','stock')">NVDA</div>
    <div class="chip stock" onclick="quickLoad('EURUSD=X','forex')">EUR/USD</div>
  </div>

  <div class="topbar-right">
    <div class="tf-label">5М</div>
    <div class="status-dot" id="statusDot"></div>
    <div class="status-txt" id="statusTxt">—</div>
    <div>
      <div class="price-big" id="priceBig">—</div>
      <div class="price-change" id="priceChange">—</div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="chart-wrap">
    <canvas id="chart"></canvas>
    <div class="alert-banner" id="alertBanner"></div>
    <div class="overlay" id="overlay">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:4px;color:#1e2d42">WAVE LEVEL</div>
      <div style="font-size:11px;color:#2a3d52;letter-spacing:2px">Выберите инструмент для анализа</div>
    </div>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="sidebar">
    <div class="sym-info" id="symInfo">Инструмент не выбран</div>

    <div class="btn-row">
      <button class="btn active" id="btnPause" onclick="togglePause()">⏸ ПАУЗА</button>
      <button class="btn" onclick="resetLevels()">↺ УРОВНИ</button>
    </div>

    <div class="sb-section">
      <div class="sb-title">Параметры</div>
      <div class="srow">Мин. касаний<span>
        <input type="range" min="2" max="6" value="2" id="slMinT" oninput="onCfgChange()">
        <span id="valMinT">2</span>
      </span></div>
      <div class="srow">Зона (%)<span>
        <input type="range" min="1" max="15" value="3" id="slZone" oninput="onCfgChange()">
        <span id="valZone">0.3</span>%
      </span></div>
      <div class="srow">Алерт (%)<span>
        <input type="range" min="1" max="20" value="5" id="slAlert" oninput="onCfgChange()">
        <span id="valAlert">0.5</span>%
      </span></div>
    </div>

    <div class="sb-section">
      <div class="sb-title">Статистика</div>
      <div class="stat-grid">
        <div class="stat-box"><div class="stat-lbl">Уровней</div><div class="stat-val" id="stLevels">0</div></div>
        <div class="stat-box"><div class="stat-lbl">Макс. касаний</div><div class="stat-val" id="stMaxT">0</div></div>
        <div class="stat-box"><div class="stat-lbl">Поддержек</div><div class="stat-val" id="stSup" style="color:var(--green)">0</div></div>
        <div class="stat-box"><div class="stat-lbl">Сопротивл.</div><div class="stat-val" id="stRes" style="color:var(--red)">0</div></div>
      </div>
    </div>

    <div class="sb-section" style="flex:1">
      <div class="sb-title">Активные уровни</div>
      <div id="levelsList"><div class="no-lvl">Загрузите инструмент</div></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════
const CFG = {
  minTouches:  2,
  zonePercent: 0.003,
  alertPct:    0.005,
  pivotLen:    5,
  maxCandles:  300,
};

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let candles     = [];
let levels      = [];
let paused      = false;
let currentSym  = null;
let symType     = null;  // 'crypto' | 'stock' | 'forex'
let ws          = null;
let lastPrice   = 0;
let openPrice   = 0;
let alertTimeout = null;
let lastAlerted = null;
let animFrame   = null;

// ═══════════════════════════════════════════════════════════════
// CANVAS
// ═══════════════════════════════════════════════════════════════
const canvas = document.getElementById('chart');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
  const w = canvas.parentElement.clientWidth;
  const h = canvas.parentElement.clientHeight;
  canvas.width  = w;
  canvas.height = h;
}
window.addEventListener('resize', () => { resizeCanvas(); drawChart(); });
resizeCanvas();

// ═══════════════════════════════════════════════════════════════
// QUICK LOAD
// ═══════════════════════════════════════════════════════════════
function quickLoad(sym, type) {
  document.getElementById('symInput').value = sym;
  loadSymbol(sym, type);
}

// ═══════════════════════════════════════════════════════════════
// LOAD SYMBOL — entry point
// ═══════════════════════════════════════════════════════════════
async function loadSymbol(forceSym, forceType) {
  const raw = (forceSym || document.getElementById('symInput').value).trim().toUpperCase();
  if (!raw) return;

  document.getElementById('symInput').value = raw;
  showOverlay(true, 'Загрузка ' + raw + '...');
  hideError();
  disconnectWS();
  candles = [];
  levels  = [];
  lastAlerted = null;
  drawChart();

  // Определяем тип инструмента
  let type = forceType || guessType(raw);
  currentSym = raw;
  symType    = type;

  try {
    if (type === 'crypto') {
      await loadCrypto(raw);
    } else {
      await loadYahoo(raw);
    }
    showOverlay(false);
    setStatus('live');
    updateSymInfo();
    scheduleRedraw();
  } catch(e) {
    showOverlay(false);
    showError('Не удалось загрузить ' + raw + '. Проверьте тикер.');
    setStatus('off');
    console.error(e);
  }
}

function guessType(sym) {
  const cryptoPairs = ['BTC','ETH','SOL','BNB','XRP','ADA','DOGE','MATIC','AVAX','DOT','LINK','UNI','LTC','ATOM','NEAR'];
  const base = sym.replace(/USDT$|BUSD$|USD$/,'');
  if (cryptoPairs.includes(base) || sym.endsWith('USDT') || sym.endsWith('BUSD')) return 'crypto';
  if (sym.includes('=X') || sym.includes('USD') && sym.length <= 7 && !sym.includes('.')) return 'forex';
  return 'stock';
}

// ═══════════════════════════════════════════════════════════════
// CRYPTO — Binance REST (history) + WebSocket (live)
// ═══════════════════════════════════════════════════════════════
async function loadCrypto(sym) {
  // Normalize: BTCUSDT, if just BTC → add USDT
  let pair = sym;
  if (!sym.endsWith('USDT') && !sym.endsWith('BUSD') && !sym.endsWith('BTC')) {
    pair = sym + 'USDT';
  }
  currentSym = pair;

  // Fetch historical candles
  const url = `https://api.binance.com/api/v3/klines?symbol=${pair}&interval=5m&limit=300`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error('Binance error: ' + resp.status);
  const data = await resp.json();

  candles = data.map(k => ({
    time:  k[0],
    open:  parseFloat(k[1]),
    high:  parseFloat(k[2]),
    low:   parseFloat(k[3]),
    close: parseFloat(k[4]),
    vol:   parseFloat(k[5]),
  }));

  lastPrice = candles[candles.length - 1].close;
  openPrice = candles[0].open;
  detectLevels();
  drawChart();
  updateUI();

  // Connect WebSocket
  connectBinanceWS(pair);
}

function connectBinanceWS(pair) {
  const wsUrl = `wss://stream.binance.com:9443/ws/${pair.toLowerCase()}@kline_5m`;
  ws = new WebSocket(wsUrl);

  ws.onopen = () => setStatus('live');

  ws.onmessage = (evt) => {
    if (paused) return;
    const msg = JSON.parse(evt.data);
    const k   = msg.k;
    const c = {
      time:  k.t,
      open:  parseFloat(k.o),
      high:  parseFloat(k.h),
      low:   parseFloat(k.l),
      close: parseFloat(k.c),
      vol:   parseFloat(k.v),
    };

    const last = candles[candles.length - 1];
    if (last && last.time === c.time) {
      candles[candles.length - 1] = c; // update current
    } else {
      candles.push(c);
      if (candles.length > CFG.maxCandles) candles.shift();
      detectLevels();
    }

    lastPrice = c.close;
    updatePriceDisplay();
    checkAlerts();
  };

  ws.onclose = () => { if (!paused) setStatus('off'); };
  ws.onerror = () => setStatus('off');
}

// ═══════════════════════════════════════════════════════════════
// STOCKS / FOREX — Yahoo Finance via CORS proxy
// ═══════════════════════════════════════════════════════════════
async function loadYahoo(sym) {
  // Yahoo Finance v8 chart endpoint — 5min interval, last 5 days
  const yahooUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=5m&range=5d`;
  const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(yahooUrl)}`;

  const resp = await fetch(proxyUrl);
  if (!resp.ok) throw new Error('Proxy error');
  const wrapper = await resp.json();
  const json    = JSON.parse(wrapper.contents);

  const result = json?.chart?.result?.[0];
  if (!result) throw new Error('No data from Yahoo');

  const timestamps = result.timestamp;
  const q = result.indicators.quote[0];

  candles = timestamps.map((t, i) => ({
    time:  t * 1000,
    open:  q.open[i],
    high:  q.high[i],
    low:   q.low[i],
    close: q.close[i],
    vol:   q.volume[i],
  })).filter(c => c.open && c.high && c.low && c.close);

  if (candles.length === 0) throw new Error('Empty candles');

  lastPrice = candles[candles.length - 1].close;
  openPrice = candles[0].open;
  detectLevels();
  drawChart();
  updateUI();

  // Poll Yahoo every 30s for stocks (no free WebSocket)
  startYahooPoll(sym);
}

let yahooInterval = null;
function startYahooPoll(sym) {
  if (yahooInterval) clearInterval(yahooInterval);
  yahooInterval = setInterval(async () => {
    if (paused) return;
    try {
      const yahooUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=5m&range=1d`;
      const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(yahooUrl)}`;
      const resp = await fetch(proxyUrl);
      const wrapper = await resp.json();
      const json = JSON.parse(wrapper.contents);
      const result = json?.chart?.result?.[0];
      if (!result) return;
      const ts = result.timestamp;
      const q  = result.indicators.quote[0];
      const fresh = ts.map((t,i) => ({
        time: t*1000, open: q.open[i], high: q.high[i],
        low: q.low[i], close: q.close[i], vol: q.volume[i],
      })).filter(c => c.open && c.close);

      if (fresh.length === 0) return;
      // Merge fresh candles
      const lastT = candles.length ? candles[candles.length-1].time : 0;
      let added = false;
      fresh.forEach(c => {
        if (c.time > lastT) { candles.push(c); added = true; }
        else if (c.time === lastT) { candles[candles.length-1] = c; }
      });
      if (candles.length > CFG.maxCandles) candles.splice(0, candles.length - CFG.maxCandles);
      lastPrice = candles[candles.length-1].close;
      if (added) detectLevels();
      updatePriceDisplay();
      checkAlerts();
    } catch(e) { /* silent */ }
  }, 30000);
}

function disconnectWS() {
  if (ws) { ws.close(); ws = null; }
  if (yahooInterval) { clearInterval(yahooInterval); yahooInterval = null; }
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
}

// ═══════════════════════════════════════════════════════════════
// LEVEL DETECTION — волновой алгоритм
// ═══════════════════════════════════════════════════════════════
function detectLevels() {
  if (candles.length < CFG.pivotLen * 2 + 1) return;
  const p = CFG.pivotLen;
  const pivots = [];

  for (let i = p; i < candles.length - p; i++) {
    const c = candles[i];
    // Pivot High
    let isHigh = true, isLow = true;
    for (let j = 1; j <= p; j++) {
      if (candles[i-j].high >= c.high || candles[i+j].high >= c.high) isHigh = false;
      if (candles[i-j].low  <= c.low  || candles[i+j].low  <= c.low)  isLow  = false;
    }
    if (isHigh) pivots.push({ price: c.high, type: 'res', idx: i });
    if (isLow)  pivots.push({ price: c.low,  type: 'sup', idx: i });
  }

  // Cluster pivots into levels
  const newLevels = [];
  pivots.forEach(p => {
    const zone = p.price * CFG.zonePercent;
    const ex = newLevels.find(l => Math.abs(l.price - p.price) < zone && l.type === p.type);
    if (ex) {
      ex.touches++;
      ex.price = (ex.price * (ex.touches - 1) + p.price) / ex.touches;
      ex.lastIdx = Math.max(ex.lastIdx, p.idx);
    } else {
      newLevels.push({ price: p.price, type: p.type, touches: 1, firstIdx: p.idx, lastIdx: p.idx, id: Math.random().toString(36).slice(2) });
    }
  });

  levels = newLevels.filter(l => l.touches >= CFG.minTouches);
  updateUI();
}

// ═══════════════════════════════════════════════════════════════
// ALERTS
// ═══════════════════════════════════════════════════════════════
function checkAlerts() {
  const banner = document.getElementById('alertBanner');
  let near = null, minD = Infinity;
  levels.forEach(l => {
    const d = Math.abs(lastPrice - l.price) / l.price;
    if (d < CFG.alertPct && d < minD) { minD = d; near = l; }
  });
  if (near && near.id !== lastAlerted) {
    lastAlerted = near.id;
    const tp = near.type === 'sup' ? 'ПОДДЕРЖКА' : 'СОПРОТИВЛЕНИЕ';
    banner.textContent = `⚡ ${tp}  ${formatPrice(near.price)}  ×${near.touches}`;
    banner.classList.add('show');
    if (alertTimeout) clearTimeout(alertTimeout);
    alertTimeout = setTimeout(() => { banner.classList.remove('show'); lastAlerted = null; }, 5000);
  }
}

// ═══════════════════════════════════════════════════════════════
// DRAW
// ═══════════════════════════════════════════════════════════════
function scheduleRedraw() {
  if (animFrame) cancelAnimationFrame(animFrame);
  animFrame = requestAnimationFrame(() => {
    drawChart();
    scheduleRedraw();
  });
}

function drawChart() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);

  // Grid
  ctx.strokeStyle = 'rgba(20,30,46,.6)';
  ctx.lineWidth = 1;
  for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  for (let x = 0; x < W; x += 60) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }

  if (candles.length < 2) return;

  const SIDEBAR_W = 0; // chart fills full width, sidebar is separate DOM element
  const CW = 7, GAP = 1, STEP = CW + GAP;
  const visCount = Math.floor((W - 80) / STEP);
  const start = Math.max(0, candles.length - visCount);
  const slice = candles.slice(start);

  let minP = Infinity, maxP = -Infinity;
  slice.forEach(c => { if (c.high > maxP) maxP = c.high; if (c.low < minP) minP = c.low; });
  const pad = (maxP - minP) * 0.12;
  minP -= pad; maxP += pad;
  const toY = p => H - ((p - minP) / (maxP - minP)) * H;

  // Detect near levels
  const nearSet = new Set(levels.filter(l => Math.abs(lastPrice - l.price) / l.price < CFG.alertPct).map(l => l.id));

  // Draw levels
  levels.forEach(lv => {
    const y = toY(lv.price);
    if (y < -10 || y > H + 10) return;
    const isNear = nearSet.has(lv.id);
    const col = lv.type === 'sup' ? '#00e676' : '#f5455c';
    const alpha = isNear ? 0.9 : 0.55;

    // Zone fill
    const zH = Math.max(2, (lv.price * CFG.zonePercent / (maxP - minP)) * H);
    ctx.fillStyle = lv.type === 'sup' ? `rgba(0,230,118,${isNear?.08:.04})` : `rgba(245,69,92,${isNear?.08:.04})`;
    ctx.fillRect(0, y - zH, W - 160, zH * 2);

    // Line
    ctx.beginPath();
    ctx.setLineDash(isNear ? [] : [5,4]);
    ctx.strokeStyle = col;
    ctx.globalAlpha = alpha;
    ctx.lineWidth = isNear ? 1.5 : 1;
    ctx.moveTo(0, y);
    ctx.lineTo(W - 160, y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;

    // Label box
    const lx = W - 158;
    ctx.fillStyle = lv.type === 'sup' ? 'rgba(0,230,118,.12)' : 'rgba(245,69,92,.12)';
    ctx.fillRect(lx, y - 10, 155, 20);
    ctx.strokeStyle = col; ctx.lineWidth = .5;
    ctx.strokeRect(lx, y - 10, 155, 20);
    ctx.fillStyle = col;
    ctx.font = `600 11px 'JetBrains Mono', monospace`;
    const lbl = `${formatPrice(lv.price)}  ×${lv.touches}`;
    ctx.fillText(lbl, lx + 8, y + 4);

    // Pulse dot near
    if (isNear) {
      const t = Date.now() / 350;
      const r = 5 + Math.sin(t) * 2;
      ctx.beginPath(); ctx.arc(lx - 5, y, r, 0, Math.PI * 2);
      ctx.fillStyle = col; ctx.globalAlpha = 0.25 + Math.sin(t) * .15;
      ctx.fill(); ctx.globalAlpha = 1;
    }

    // Touch dots on left
    for (let t = 0; t < Math.min(lv.touches, 10); t++) {
      ctx.beginPath(); ctx.arc(10 + t * 11, y, 3, 0, Math.PI * 2);
      ctx.fillStyle = col; ctx.globalAlpha = .65;
      ctx.fill(); ctx.globalAlpha = 1;
    }
  });

  // Draw candles
  slice.forEach((c, i) => {
    const x = i * STEP + CW / 2;
    const isUp = c.close >= c.open;
    const col = isUp ? '#00e676' : '#f5455c';
    const yH = toY(c.high), yL = toY(c.low);
    const yO = toY(c.open), yC = toY(c.close);
    const bodyTop = Math.min(yO, yC);
    const bodyH = Math.max(1, Math.abs(yO - yC));

    ctx.strokeStyle = col; ctx.lineWidth = 1;
    ctx.globalAlpha = .45;
    ctx.beginPath(); ctx.moveTo(x, yH); ctx.lineTo(x, yL); ctx.stroke();
    ctx.globalAlpha = .9;
    ctx.fillStyle = col;
    ctx.fillRect(x - CW/2, bodyTop, CW, bodyH);
    ctx.globalAlpha = 1;
  });

  // Current price line
  if (lastPrice > 0) {
    const py = toY(lastPrice);
    ctx.setLineDash([3,4]);
    ctx.strokeStyle = 'rgba(79,195,247,.7)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, py); ctx.lineTo(W, py); ctx.stroke();
    ctx.setLineDash([]);
    // Price tag
    ctx.fillStyle = 'rgba(79,195,247,.15)';
    ctx.fillRect(W - 158, py - 10, 155, 20);
    ctx.strokeStyle = '#4fc3f7'; ctx.lineWidth = .5;
    ctx.strokeRect(W - 158, py - 10, 155, 20);
    ctx.fillStyle = '#4fc3f7';
    ctx.font = `600 12px 'JetBrains Mono', monospace`;
    ctx.fillText('▶  ' + formatPrice(lastPrice), W - 152, py + 4);
  }
}

// ═══════════════════════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════════════════════
function formatPrice(p) {
  if (!p) return '—';
  if (p >= 1000)  return p.toFixed(2);
  if (p >= 10)    return p.toFixed(3);
  if (p >= 1)     return p.toFixed(4);
  return p.toFixed(6);
}

function updatePriceDisplay() {
  const el = document.getElementById('priceBig');
  const ch = document.getElementById('priceChange');
  el.textContent = formatPrice(lastPrice);
  const pct = openPrice ? ((lastPrice - openPrice) / openPrice * 100) : 0;
  const isUp = lastPrice >= openPrice;
  el.className = 'price-big ' + (isUp ? 'up' : 'down');
  ch.textContent = (isUp ? '▲' : '▼') + ' ' + Math.abs(pct).toFixed(2) + '%';
  ch.className = 'price-change ' + (isUp ? 'up' : 'down');
}

function updateUI() {
  if (!currentSym) return;
  updatePriceDisplay();

  const nearSet = new Set(levels.filter(l => Math.abs(lastPrice - l.price) / l.price < CFG.alertPct).map(l => l.id));
  const sorted = [...levels].sort((a,b) => b.price - a.price);

  document.getElementById('stLevels').textContent = levels.length;
  document.getElementById('stMaxT').textContent = levels.length ? Math.max(...levels.map(l=>l.touches)) : 0;
  document.getElementById('stSup').textContent = levels.filter(l=>l.type==='sup').length;
  document.getElementById('stRes').textContent = levels.filter(l=>l.type==='res').length;

  const list = document.getElementById('levelsList');
  if (!sorted.length) {
    list.innerHTML = '<div class="no-lvl">Накапливаю данные...</div>';
    return;
  }
  list.innerHTML = sorted.map(lv => {
    const near = nearSet.has(lv.id);
    const dots = Array.from({length: Math.min(lv.touches, 8)}, () => '<div class="lc-dot"></div>').join('');
    return `<div class="level-card ${lv.type}${near?' near':''}">
      <div class="lc-row">
        <div class="lc-price">${formatPrice(lv.price)}</div>
        <div class="lc-badge">${lv.type==='sup'?'SUP':'RES'}</div>
      </div>
      <div style="display:flex;align-items:center;gap:5px;margin-top:3px">
        <div class="lc-dots">${dots}</div>
        <span style="color:var(--text);font-size:10px">${lv.touches} касани${lv.touches===1?'е':lv.touches<5?'я':'й'}</span>
        ${near?'<span class="lc-near-ico">⚡</span>':''}
      </div>
    </div>`;
  }).join('');
}

function updateSymInfo() {
  const typeLabel = symType === 'crypto' ? '🔷 Криптовалюта' : symType === 'forex' ? '💱 Форекс' : '📈 Акция';
  const src = symType === 'crypto' ? 'Binance WS' : 'Yahoo Finance (30s)';
  document.getElementById('symInfo').innerHTML =
    `<b>${currentSym}</b> · ${typeLabel}<br>Источник: ${src} · Свечи: 5М`;
}

function setStatus(s) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusTxt');
  dot.className = 'status-dot ' + (s==='live'?'live':s==='loading'?'loading':'');
  txt.textContent = s==='live'?'LIVE':s==='loading'?'ЗАГРУЗКА':'OFFLINE';
}

function showOverlay(show, msg) {
  const ov = document.getElementById('overlay');
  if (show) {
    ov.classList.remove('hidden');
    ov.innerHTML = `<div class="spinner"></div><div class="overlay-txt">${msg||'Загрузка...'}</div>`;
  } else {
    ov.classList.add('hidden');
  }
}
function showError(msg) {
  const e = document.getElementById('errorMsg');
  e.textContent = msg; e.style.display='block';
  setTimeout(() => e.style.display='none', 5000);
}
function hideError() { document.getElementById('errorMsg').style.display='none'; }

// ═══════════════════════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════════════════════
function togglePause() {
  paused = !paused;
  const btn = document.getElementById('btnPause');
  btn.textContent = paused ? '▶ СТАРТ' : '⏸ ПАУЗА';
  btn.classList.toggle('active', !paused);
}

function resetLevels() {
  levels = [];
  lastAlerted = null;
  document.getElementById('alertBanner').classList.remove('show');
  detectLevels();
  drawChart();
  updateUI();
}

function onCfgChange() {
  const minT = parseInt(document.getElementById('slMinT').value);
  const zone = parseInt(document.getElementById('slZone').value);
  const alrt = parseInt(document.getElementById('slAlert').value);
  document.getElementById('valMinT').textContent = minT;
  document.getElementById('valZone').textContent = (zone/10).toFixed(1);
  document.getElementById('valAlert').textContent = (alrt/10).toFixed(1);
  CFG.minTouches  = minT;
  CFG.zonePercent = zone / 1000;
  CFG.alertPct    = alrt / 1000;
  detectLevels();
  drawChart();
}

// Enter key
document.getElementById('symInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') loadSymbol();
});

// Initial draw
drawChart();
</script>
